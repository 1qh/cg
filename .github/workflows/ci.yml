name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        run: rustup toolchain install stable --profile minimal
      - name: install lintmax-rs
        run: cargo install --git https://github.com/1qh/lintmax-rs --locked
      - name: lintmax max-strict gate (bridge)
        working-directory: bridge
        run: cargo lintmax check
      - name: codex mirror drift gate
        run: make codex-drift
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: install node deps
        run: npm ci
      - name: offline can-fail verify suite
        run: make verify
  live:
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        run: rustup toolchain install stable --profile minimal
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: guard — skip live suite without a key
        id: key
        run: |
          if [ -n "${GEMINI_API_KEY}" ]; then echo "present=1" >>"${GITHUB_OUTPUT}"; else echo "present=0" >>"${GITHUB_OUTPUT}"; fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: build bridge + install node deps
        if: steps.key.outputs.present == '1'
        run: make bridge-bootstrap && npm ci
      - name: live capability suite on the real Gemini path
        if: steps.key.outputs.present == '1'
        run: make verify-live
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
