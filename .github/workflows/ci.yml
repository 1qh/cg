name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        run: rustup toolchain install stable --profile minimal
      - name: install lintmax-rs
        run: cargo install --git https://github.com/1qh/lintmax-rs --locked
      - name: lintmax max-strict gate (bridge)
        working-directory: bridge
        run: cargo lintmax check
      - name: codex mirror drift gate
        run: make codex-drift
      - name: catalog codegen freshness gate
        run: make catalog-check
