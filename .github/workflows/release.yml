name: bridge-release
on:
  push:
    tags: ['bridge-v*']
permissions:
  contents: write
concurrency:
  group: bridge-release-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: codex-gemini-bridge-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: codex-gemini-bridge-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: codex-gemini-bridge-linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: codex-gemini-bridge-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - run: rustup toolchain install stable --profile minimal && rustup target add ${{ matrix.target }}
      - run: cargo build --release --manifest-path bridge/Cargo.toml --target ${{ matrix.target }} >/dev/null 2>err || cat err
      - run: cp bridge/target/${{ matrix.target }}/release/codex-gemini-bridge ${{ matrix.asset }}
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          tag_name: ${{ github.ref_name }}
